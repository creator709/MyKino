<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  background: black;
  padding: 15px;
  font-size: 24px;
  color: red;
}

.container {
  padding: 20px;
}

img {
  width: 200px;
  border-radius: 10px;
}

.player {
  margin-top: 20px;
}

.buttons {
  margin-top: 15px;
}

.buttons button {
  margin: 5px;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>MyKino 🎬</header>

<div class="container">

  <h2>Слабый герой</h2>

  <img src="IMG_20260330_235653.jpg">

  <!-- Плеер -->
  <div class="player">
    <iframe id="videoPlayer"
      width="100%" height="400"
      src=""
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Кнопки серий -->
  <div class="buttons">
    <button onclick="play(1)">1 серия</button>
    <button onclick="play(2)">2 серия</button>
    <button onclick="play(3)">3 серия</button>
    <button onclick="play(4)">4 серия</button>
    <button onclick="play(5)">5 серия</button>
    <button onclick="play(6)">6 серия</button>
    <button onclick="play(7)">7 серия</button>
    <button onclick="play(8)">8 серия</button>
  </div>

</div>

<script>
function play(ep) {

  if (ep == 1) {
    document.getElementById("videoPlayer").src =
    "https://www.youtube.com/embed/Cxn6G0jiUk0";
  }

  if (ep == 2) {
    document.getElementById("videoPlayer").src =
    "https://www.youtube.com/embed/Cxn6G0jiUk0";
  }

  if (ep == 3) {
    document.getElementById("videoPlayer").src =
    "https://www.youtube.com/embed/Cxn6G0jiUk0";
  }

  // добавишь другие серии потом
}
</script>

</body>
</html>
