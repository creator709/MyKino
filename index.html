<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino</title>

<style>
body {
  margin: 0;
  background: #0e0e0e;
  color: white;
  font-family: Arial;
}

header {
  background: black;
  padding: 15px;
  color: red;
  font-size: 22px;
}

.container {
  padding: 20px;
}

.poster {
  width: 200px;
  border-radius: 10px;
}

video {
  width: 100%;
  margin-top: 20px;
  border-radius: 10px;
  background: black;
}

.buttons {
  margin-top: 15px;
}

.buttons button {
  margin: 5px;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>MyKino 🎬</header>

<div class="container">

<h2>Стандартная процедура идеального брака</h2>

<img src="IMG_20260330_235653.jpg" class="poster">

<!-- ПЛЕЕР -->
<video controls id="player"></video>

<!-- КНОПКИ -->
<div class="buttons">
  <button onclick="play(1)">1 серия</button>
  <button onclick="play(2)">2 серия</button>
  <button onclick="play(3)">3 серия</button>
  <button onclick="play(4)">4 серия</button>
  <button onclick="play(5)">5 серия</button>
  <button onclick="play(6)">6 серия</button>
  <button onclick="play(7)">7 серия</button>
  <button onclick="play(8)">8 серия</button>
  <button onclick="play(9)">9 серия</button>
  <button onclick="play(10)">10 серия</button>
  <button onclick="play(11)">11 серия</button>
  <button onclick="play(12)">12 серия</button>
</div>

</div>

<script>
function play(ep) {

  let player = document.getElementById("player");

  if (ep == 1) {

    // 🔥 ВСТАВЬ СЮДА ССЫЛКУ НА ВИДЕО
    player.src = "ССЫЛКА_НА_ТВОЁ_ВИДЕО";

    player.play();

  } else {
    alert("Серия пока не добавлена");
  }

}
</script>

</body>
</html>
