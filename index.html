<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MyKino</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: black;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      color: red;
    }

    h2 {
      margin-left: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      width: 200px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
    }

    .card-title {
      padding: 10px;
      font-weight: bold;
    }

    .btn {
      display: block;
      margin: 10px;
      padding: 10px;
      background: red;
      color: white;
      text-align: center;
      border-radius: 5px;
      text-decoration: none;
    }

    iframe {
      margin-top: 30px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>MyKino</header>

<h2>Дорамы</h2>

<div class="container">

  <div class="card">
    <img src="IMG_20260330_235653.jpg" alt="Слабый герой">
    <div class="card-title">Слабый герой</div>
    <a href="#video" class="btn">Смотреть</a>
  </div>

  <!-- ВИДЕО -->
  <iframe 
    id="video"
    width="100%" 
    height="400"
    src="https://www.youtube.com/embed/Cxn6G0jiUk0?start=60" 
    frameborder="0" 
    allowfullscreen>
  </iframe>

</div>

</body>
</html>

.movie img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}

.player {
  margin-top: 30px;
}
</style>
</head>

<body>

<header>MyKino</header>

<div class="container">
  <h2>Дорамы</h2>

  <div class="movies">

    <!-- Слабый герой -->
    <div class="movie">
      <img src="IMG_20260330_235653.jpg">
      <h3>Слабый герой</h3>

      <button onclick="playVideo()">Смотреть</button>
    </div>

  </div>

  <!-- Плеер -->
  <div class="player" id="player"></div>

</div>

<script>
function playVideo() {
  document.getElementById("player").innerHTML = `
    <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/6c8R1wZ8hWg"
    frameborder="0" allowfullscreen></iframe>
  `;
}
</script>

</body>
</html>
