<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  background: black;
  padding: 15px 20px;
  font-size: 24px;
  color: red;
  font-weight: bold;
}

/* GRID */
.container {
  padding: 20px;
}

.movies {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 180px;
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.title {
  padding: 10px;
  font-size: 14px;
}

/* BUTTON */
.btn {
  display: block;
  margin: 10px;
  padding: 8px;
  background: red;
  text-align: center;
  border-radius: 5px;
  color: white;
  text-decoration: none;
}
</style>

</head>
<body>

<header>MyKino 🎬</header>

<div class="container">

  <h2>Дорамы</h2>

  <div class="movies">

    <!-- Слабый герой -->
    <div class="card">
      <img src="IMG_20260330_235653.jpg">
      <div class="title">Слабый герой</div>

      <a href="https://youtu.be/Cxn6G0jiUk0" target="_blank" class="btn">
        Смотреть
      </a>
    </div>

  </div>

</div>

</body>
</html>
