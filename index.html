<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino 🎬</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

header {
  background: #000;
  padding: 15px;
  color: red;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.movies {
  display: flex;
  gap: 20px;
}

.movie {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  width: 200px;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}

.player {
  margin-top: 30px;
}
</style>
</head>

<body>

<header>MyKino</header>

<div class="container">
  <h2>Дорамы</h2>

  <div class="movies">

    <!-- Слабый герой -->
    <div class="movie">
      <img src="IMG_20260330_235653.jpg">
      <h3>Слабый герой</h3>

      <button onclick="playVideo()">Смотреть</button>
    </div>

  </div>

  <!-- Плеер -->
  <div class="player" id="player"></div>

</div>

<script>
function playVideo() {
  document.getElementById("player").innerHTML = `
    <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/6c8R1wZ8hWg"
    frameborder="0" allowfullscreen></iframe>
  `;
}
</script>

</body>
</html>
