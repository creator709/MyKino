<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino 🎬</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    background: #111;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #e50914;
}

.search {
    padding: 7px;
    border-radius: 5px;
    border: none;
}

/* GRID */
.movies {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 15px;
}

.movie {
    background: #1c1c1c;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.movie:hover {
    transform: scale(1.05);
}

.movie img {
    width: 100%;
}

.movie-title {
    padding: 10px;
    font-size: 14px;
}

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    background: #e50914;
    padding: 8px;
    color: white;
    text-decoration: none;
    margin: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <div class="logo">MyKino 🎬</div>
    <input class="search" placeholder="Поиск...">
</header>

<div class="movies">

    <div class="movie">
        <img src="https://via.placeholder.com/300x400">
        <d
          iv class="movie-title">Фильм 1</div>
        <a class="btn" href="#">Смотреть</a>
    </div>

    <div class="movie">
        <img src="https://via.placeholder.com/300x400">
        <div class="movie-title">Фильм 2</div>
        <a class="btn" href="#">Смотреть</a>
    </div>

    <div class="movie">
        <img src="https://via.placeholder.com/300x400">
        <div class="movie-title">Фильм 3</div>
        <a class="btn" href="#">Смотреть</a>
    </div>

</div>

</body>
</html>
