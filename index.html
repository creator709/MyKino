<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0e0e0e;
  color: white;
}

/* HEADER */
header {
  background: black;
  padding: 15px;
  color: red;
  font-size: 22px;
}

/* ГЛАВНАЯ */
.movies {
  padding: 20px;
}

.movie {
  width: 200px;
  cursor: pointer;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

/* СТРАНИЦА ПЛЕЕРА */
.player-page {
  display: none;
  padding: 20px;
}

.back {
  color: red;
  margin-bottom: 10px;
  display: inline-block;
  cursor: pointer;
}

/* ПЛЕЕР */
.player-box {
  height: 300px;
  background: black;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: gray;
}

/* КНОПКИ */
.episodes button {
  margin: 5px;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>

</head>

<body>

<header>MyKino 🎬</header>

<!-- ГЛАВНАЯ -->
<div id="home" class="movies">

  <div class="movie" onclick="openPlayer()">
    <img src="IMG_20260330_235653.jpg">
    <p>Слабый герой</p>
  </div>

</div>

<!-- СТРАНИЦА ДОРАМЫ -->
<div id="playerPage" class="player-page">

  <div class="back" onclick="goBack()">← Назад</div>

  <h2>Слабый герой</h2>

  <!-- ПЛЕЕР -->
  <div class="player-box" id="player">
    Выбери серию
  </div>

  <!-- КНОПКИ -->
  <div class="episodes">
    <button onclick="play(1)">1 серия</button>
    <button onclick="play(2)">2 серия</button>
    <button onclick="play(3)">3 серия</button>
    <button onclick="play(4)">4 серия</button>
    <button onclick="play(5)">5 серия</button>
    <button onclick="play(6)">6 серия</button>
    <button onclick="play(7)">7 серия</button>
    <button onclick="play(8)">8 серия</button>
  </div>

</div>

<script>
function openPlayer() {
  document.getElementById("home").style.display = "none";
  document.getElementById("playerPage").style.display = "block";
}

function goBack() {
  document.getElementById("home").style.display = "block";
  document.getElementById("playerPage").style.display = "none";
}

function play(ep) {
  document.getElementById("player").innerHTML =
    "Сейчас выбрана серия: " + ep;
}
</script>

</body>
</html>
