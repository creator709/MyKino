<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MyKino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0e0e0e;
  color: white;
}

/* HEADER */
header {
  background: #111;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: red;
  font-size: 22px;
  font-weight: bold;
}

.search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* MOVIES GRID */
.movies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

.movie {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.movie:hover {
  transform: scale(1.05);
}

.movie img {
  width: 100%;
}

.title {
  padding: 10px;
  font-size: 14px;
}

/* PLAYER PAGE */
.player-page {
  display: none;
  padding: 15px;
}

.back {
  margin-bottom: 10px;
  display: inline-block;
  color: red;
  cursor: pointer;
}

video {
  width: 100%;
  border-radius: 10px;
}

.episodes button {
  margin: 5px;
  padding: 8px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>

</head>
<body>

<header>
  <div class="logo">MyKino 🎬</div>
  <input class="search" placeholder="Поиск...">
</header>

<!-- ГЛАВНАЯ -->
<div id="home">

  <div class="movies">

    <div class="movie" onclick="openPlayer()">
      <img src="IMG_20260330_235653.jpg">
      <div class="title">Слабый герой</div>
    </div>

  </div>

</div>

<!-- СТРАНИЦА ПЛЕЕРА -->
<div class="player-page" id="playerPage">

  <div class="back" onclick="goBack()">← Назад</div>

  <h2>Слабый герой</h2>

  <video controls id="player">
    <source src="video1.mp4" type="video/mp4">
  </video>

  <div class="episodes">
    <button onclick="changeVideo('video1.mp4')">1 серия</button>
    <button onclick="changeVideo('video2.mp4')">2 серия</button>
    <button onclick="changeVideo('video3.mp4')">3 серия</button>
  </div>

</div>

<script>
function openPlayer() {
  document.getElementById("home").style.display = "none";
  document.getElementById("playerPage").style.display = "block";
}

function goBack() {
  document.getElementById("home").style.display = "block";
  document.getElementById("playerPage").style.display = "none";
}

function changeVideo(file) {
  document.getElementById("player").src = file;
}
</script>

</body>
</html>
